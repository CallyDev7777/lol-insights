name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lol-insights/api:${{ github.sha }} .
          docker tag europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lol-insights/api:${{ github.sha }} \
            europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lol-insights/api:latest

      - name: Push Docker image
        run: |
          docker push europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lol-insights/api:${{ github.sha }}
          docker push europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lol-insights/api:latest

      - name: Connect to GKE
        uses: google-github-actions/get-gke-credentials@v1
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: europe-west2
      
      - name: Pull Riot API secret
        run: |
          kubectl create secret generic lol-insights-secret \
            --from-literal=RIOT_API_KEY=${{ secrets.RIOT_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/lol-insights-api \
            api=europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lol-insights/api:${{ github.sha }}
          kubectl rollout status deployment/lol-insights-api